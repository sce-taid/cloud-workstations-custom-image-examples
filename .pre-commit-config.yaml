repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/google/keep-sorted
    rev: v0.8.0
    hooks:
      - id: keep-sorted

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix, --extend-ignore, E402]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(css|html|js|json|jsx|md|scss|ts|tsx|yaml|yml)$
        exclude: |
          (?x)^(
            examples/preflight/web/package-lock\.json|
            skills/persona-swe/scripts/go\.sum|
            .*/dist/.*
          )

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args:
          [
            -e,
            SC2153,
            -e,
            SC2086,
            -e,
            SC2155,
            -e,
            SC2001,
            -e,
            SC2016,
            -e,
            SC2034,
            -e,
            SC1083,
            -e,
            SC1090,
            -e,
            SC2129,
            -e,
            SC2140,
            -e,
            SC2317,
            -e,
            SC2030,
            -e,
            SC2031,
            -e,
            SC1091,
          ]

  - repo: local
    hooks:
      - id: gofmt
        name: Go Formatting (gofmt)
        entry: gofmt -w
        language: system
        types: [go]

      - id: golangci-lint
        name: Go Linting (golangci-lint)
        entry: bash -c 'cd skills/persona-swe/scripts && go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5 run ./... --timeout 5m'
        language: system
        pass_filenames: false
        files: ^skills/persona-swe/

      # --- SECTION: General & Shared Tooling ---

      - id: clean-whitespace
        name: Clean Trailing Whitespace (Custom)
        entry: bash -c 'cd skills/persona-swe/scripts && go run cmd/clean_whitespace/main.go "$@"' --
        language: system
        pass_filenames: true
        types: [text]
        exclude: |
          (?x)^(
            node_modules/|
            dist/|
            vendor/|
            tests/integration/|
            .*\.go$
          )

      - id: check-licenses
        name: Check License Headers
        entry: ./skills/persona-legal/scripts/check_licenses.py
        language: script
        pass_filenames: false

      - id: gitseep
        name: GitSeep (amend and auto-approve)
        entry: bash -c 'cd skills/persona-swe/scripts && go run cmd/gitseep/main.go -ay -c ../../../.gitseep.yaml'
        language: system
        pass_filenames: false
        stages: [manual]

      - id: gitseep-check
        name: Validate GitSeep Stratigraphy
        entry: bash -c 'cd skills/persona-swe/scripts && go run cmd/gitseep/main.go check -c ../../../.gitseep.yaml'
        language: system
        pass_filenames: false

      # --- SECTION: Skills & Personas ---

      - id: bats-skills
        name: Skills Unit Tests (Bats)
        entry: bash -c 'for d in skills/*/tests; do if ls "$d"/*.bats > /dev/null 2>&1; then bats "$d"; fi; done'
        language: system
        pass_filenames: false

      - id: pytest-skills
        name: Skills Unit Tests (Pytest)
        entry: bash -c 'for d in skills/*/tests; do if ls "$d"/*.py > /dev/null 2>&1; then pytest "$d"; fi; done'
        language: system
        pass_filenames: false

      - id: go-test-persona-swe
        name: Persona SWE Scripts Unit Tests (Go)
        entry: bash -c 'cd skills/persona-swe/scripts && go test ./...'
        language: system
        files: ^skills/persona-swe/
        pass_filenames: false

      # --- SECTION: Preflight Dashboard ---

      - id: bats-preflight
        name: Preflight Unit Tests (Bats)
        entry: bats -r examples/preflight/tests/unit/
        language: system
        files: ^examples/preflight/
        pass_filenames: false

      - id: npm-install-preflight
        name: Install Preflight Dependencies
        entry: npm install --prefix examples/preflight/web
        language: system
        files: ^examples/preflight/web/package-lock\.json$
        pass_filenames: false
        require_serial: true

      - id: vitest
        name: Frontend Tests (Vitest)
        entry: npm run test --prefix examples/preflight/web
        language: system
        files: ^examples/preflight/web/
        pass_filenames: false

      # --- SECTION: Image Layers ---

      - id: bats-images
        name: Images Unit Tests (Bats)
        entry: bash -c 'bats -r examples/images/*/tests/unit/'
        language: system
        files: ^examples/images/
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.31.0
    hooks:
      - id: eslint
        files: ^examples/preflight/web/
        args: [--config, examples/preflight/web/eslint.config.js]
        additional_dependencies:
          - eslint@9.31.0
          - "typescript-eslint@8.58.2"
          - "globals@15.15.0"
